<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gnoming Around — Clubhouse Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#2f7d4f; --green-dk:#1e5236; --green-lt:#5bbb7b;
    --cream:#f6f1e3; --cream-dk:#ece3cd;
    --red:#c0392b; --wood:#8a5a2b; --ink:#243027;
    --gold:#e2a93b;
    --card:#ffffff; --line:#e4ddc8;
    --font-head:'Fredoka',system-ui,sans-serif;
    --font-body:'Nunito',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;}
  body{
    font-family:var(--font-body);font-size:16px;color:var(--ink);
    background:
      radial-gradient(circle at 12% 0%, rgba(91,187,123,.18), transparent 42%),
      radial-gradient(circle at 90% 8%, rgba(226,169,59,.16), transparent 40%),
      var(--cream);
    min-height:100vh;
  }
  .wrap{max-width:760px;margin:0 auto;padding:22px 16px 60px;}

  header{text-align:center;margin-bottom:18px;}
  .eyebrow{font-family:var(--font-head);font-weight:600;color:var(--green);letter-spacing:2px;text-transform:uppercase;font-size:12px;}
  h1{font-family:var(--font-head);font-weight:700;font-size:clamp(30px,7vw,46px);color:var(--green-dk);line-height:1.05;margin:4px 0 2px;}
  h1 .emoji{filter:drop-shadow(0 2px 2px rgba(0,0,0,.15));}
  .sub{color:#6b7568;font-size:15px;}

  .tabs{display:flex;gap:8px;background:var(--cream-dk);padding:5px;border-radius:14px;margin:18px auto 22px;max-width:380px;}
  .tab{flex:1;font-family:var(--font-head);font-weight:600;font-size:15px;color:#6b7568;background:transparent;border:none;padding:11px;border-radius:10px;cursor:pointer;transition:all .15s;}
  .tab.active{background:var(--green);color:#fff;box-shadow:0 3px 8px rgba(47,125,79,.35);}

  .view{display:none;}
  .view.active{display:block;animation:fade .3s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
  @media (max-width:560px){.stats{grid-template-columns:repeat(2,1fr);}}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 12px;text-align:center;box-shadow:0 2px 6px rgba(0,0,0,.04);cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;position:relative;}
  .stat:hover,.stat:active{transform:translateY(-2px);box-shadow:0 7px 16px rgba(47,125,79,.18);border-color:var(--green-lt);}
  .stat::after{content:"›";position:absolute;top:7px;right:10px;color:#cfd6c7;font-family:var(--font-head);font-weight:700;}
  .stats-hint{text-align:center;font-size:13px;color:#9aa08f;font-style:italic;margin:-4px 0 12px;}
  .stat .ico{font-size:22px;line-height:1;}
  .stat .lbl{font-family:var(--font-head);font-weight:600;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:#8a937f;margin:6px 0 3px;}
  .stat .val{font-family:var(--font-head);font-weight:700;font-size:19px;color:var(--green-dk);line-height:1.15;word-break:break-word;}
  .stat .val small{display:block;font-family:var(--font-body);font-weight:600;font-size:12px;color:#9aa08f;margin-top:2px;}

  .section-title{font-family:var(--font-head);font-weight:600;font-size:16px;color:var(--green-dk);margin:0 2px 12px;display:flex;align-items:center;gap:8px;}

  .game{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,.04);}
  .game.live{border:2px solid var(--green-lt);background:linear-gradient(180deg,#f3fbf5,#fff);}
  .game-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .game-date{font-family:var(--font-head);font-weight:600;color:var(--wood);font-size:14px;}
  .live-badge{font-family:var(--font-head);font-weight:700;font-size:12px;color:#fff;background:var(--green);padding:3px 9px;border-radius:99px;letter-spacing:.5px;}
  .game-del{background:var(--cream);border:1px solid var(--line);color:#9aa08f;font-size:15px;cursor:pointer;padding:5px 9px;border-radius:9px;transition:all .15s;line-height:1;}
  .game-del:hover,.game-del:active{color:#fff;background:var(--red);border-color:var(--red);}
  .row{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px dashed var(--line);}
  .row:first-of-type{border-top:none;}
  .row .rank{flex:0 0 24px;font-family:var(--font-head);font-weight:700;color:#b9bfa9;font-size:14px;text-align:center;}
  .row .pname{flex:1;font-weight:600;min-width:0;}
  .row .rounds{font-family:var(--font-head);font-size:12px;color:#aab0a0;margin-right:4px;white-space:nowrap;}
  .row .pscore{font-family:var(--font-head);font-weight:700;font-size:18px;color:var(--ink);min-width:34px;text-align:right;}
  .row.winner{background:linear-gradient(90deg,rgba(226,169,59,.16),transparent);border-radius:8px;margin:0 -6px;padding-left:6px;padding-right:6px;}
  .row.winner .rank{color:var(--gold);}
  .row.winner .pname:after{content:" 🏆";}
  .row.leader .pname:after{content:" ⛳";}

  .empty{text-align:center;color:#9aa08f;padding:40px 20px;font-style:italic;}
  .empty .big{font-size:40px;margin-bottom:10px;font-style:normal;}

  .form-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 18px;box-shadow:0 2px 10px rgba(0,0,0,.05);}
  .field{margin-bottom:18px;}
  .field > label{display:block;font-family:var(--font-head);font-weight:600;font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:#8a937f;margin-bottom:8px;}
  .stepper{display:flex;align-items:center;gap:14px;}
  .stepper button{width:42px;height:42px;border-radius:11px;border:none;background:var(--green);color:#fff;font-size:24px;font-family:var(--font-head);cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;transition:transform .08s,background .15s;}
  .stepper button:active{transform:scale(.92);}
  .stepper button:disabled{background:#cfd6c7;cursor:not-allowed;}
  .stepper .count{font-family:var(--font-head);font-weight:700;font-size:26px;color:var(--green-dk);min-width:34px;text-align:center;}
  input[type=date]{font-family:var(--font-body);font-size:16px;padding:12px 14px;border:2px solid var(--line);border-radius:11px;background:#fcfaf3;color:var(--ink);width:100%;}
  input:focus{outline:none;border-color:var(--green-lt);}

  .players{display:flex;flex-direction:column;gap:10px;}
  .prow{display:flex;gap:10px;align-items:center;}
  .prow .pn{flex:0 0 26px;text-align:center;font-size:20px;}
  .prow input.name{flex:1;font-family:var(--font-body);font-size:16px;padding:12px 14px;border:2px solid var(--line);border-radius:11px;background:#fcfaf3;color:var(--ink);min-width:0;}
  .prow input.score{flex:0 0 84px;font-family:var(--font-head);font-weight:700;font-size:18px;text-align:center;padding:12px 8px;border:2px solid var(--line);border-radius:11px;background:#fcfaf3;color:var(--ink);}
  .prow .rname{flex:1;font-weight:700;min-width:0;}
  .prow .rprev{flex:0 0 auto;font-family:var(--font-head);font-size:12px;color:#9aa08f;text-align:right;}
  .prow .rprev b{color:var(--green-dk);font-size:15px;}
  .hint{font-size:13px;color:#9aa08f;margin-top:7px;}
  .err{color:var(--red);font-size:14px;font-weight:600;min-height:20px;margin:10px 0 4px;text-align:center;}
  .btn{width:100%;font-family:var(--font-head);font-weight:700;font-size:17px;color:#fff;background:linear-gradient(180deg,var(--green-lt),var(--green));border:none;border-radius:13px;padding:15px;cursor:pointer;box-shadow:0 5px 0 var(--green-dk);transition:transform .08s,box-shadow .08s;letter-spacing:.5px;}
  .btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--green-dk);}
  .btn.secondary{background:none;color:#9aa08f;box-shadow:none;font-size:14px;padding:10px;margin-top:4px;}
  .btn.secondary:active{transform:none;}
  .progress{display:flex;gap:6px;justify-content:center;margin:2px 0 16px;}
  .pip{width:38px;height:7px;border-radius:99px;background:var(--cream-dk);}
  .pip.done{background:var(--green-lt);}
  .pip.cur{background:var(--gold);}
  .roundtitle{font-family:var(--font-head);font-weight:700;font-size:20px;color:var(--green-dk);text-align:center;margin-bottom:4px;}
  .roundsub{text-align:center;color:#8a937f;font-size:13px;margin-bottom:16px;}

  /* stat detail modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(25,40,28,.5);display:none;align-items:flex-start;justify-content:center;padding:24px 14px;z-index:100;overflow-y:auto;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--cream);border-radius:18px;max-width:520px;width:100%;padding:22px 20px 24px;box-shadow:0 24px 60px rgba(0,0,0,.45);position:relative;animation:pop .25s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.98);}to{opacity:1;transform:none;}}
  .modal-close{position:absolute;top:12px;right:12px;width:34px;height:34px;border:none;background:var(--cream-dk);border-radius:50%;font-size:15px;color:#6b7568;cursor:pointer;}
  .modal-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;padding-right:34px;}
  .modal-head .mico{font-size:30px;line-height:1;}
  .modal-head .mtitle{font-family:var(--font-head);font-weight:700;font-size:23px;color:var(--green-dk);}
  .modal-explain{color:#6b7568;font-size:14px;line-height:1.5;margin-bottom:14px;}
  .drow{display:flex;align-items:center;gap:12px;padding:9px 4px;border-top:1px solid var(--line);}
  .drow:first-child{border-top:none;}
  .drow .drank{flex:0 0 26px;font-family:var(--font-head);font-weight:700;color:#b9bfa9;text-align:center;}
  .drow.top .drank{color:var(--gold);}
  .drow .dmain{flex:1;min-width:0;}
  .drow .dname{font-weight:700;}
  .drow .dsub{font-size:12px;color:#9aa08f;margin-top:1px;line-height:1.35;}
  .drow .dval{font-family:var(--font-head);font-weight:700;font-size:20px;color:var(--green-dk);}
  .drow.top .dval{color:var(--gold);}
  .logitem{border-top:1px solid var(--line);padding:9px 2px;}
  .logitem:first-child{border-top:none;}
  .logdate{font-family:var(--font-head);font-weight:600;color:var(--wood);font-size:14px;margin-bottom:4px;}
  .lrow{display:flex;justify-content:space-between;padding:3px 8px;border-radius:6px;}
  .lrow.win{background:rgba(226,169,59,.16);font-weight:700;}
  .lrow .lv{font-family:var(--font-head);font-weight:700;}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(16px);background:var(--green-dk);color:#fff;font-family:var(--font-head);font-weight:600;padding:13px 22px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.3);transition:transform .35s cubic-bezier(.2,1.3,.4,1),opacity .25s,visibility .25s;z-index:50;opacity:0;visibility:hidden;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible;}
  .setup-warn{background:#fff;border:1px solid var(--gold);border-radius:14px;padding:22px;text-align:center;color:#7a6a3a;line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Grandpa Beck's · Gnome Mini-Golf</div>
    <h1><span class="emoji">🧙‍♂️</span> Gnoming Around <span class="emoji">⛳</span></h1>
    <div class="sub">Clubhouse Leaderboard — 3 rounds, lowest total wins!</div>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="board">🏆 Leaderboard</button>
    <button class="tab" data-view="new">➕ New / Continue</button>
  </div>

  <section class="view active" id="view-board">
    <div class="stats-hint">Tap any stat for the full breakdown ›</div>
    <div class="stats" id="stats"></div>
    <div id="live"></div>
    <div class="section-title">📋 Past Games</div>
    <div id="games"></div>
  </section>

  <section class="view" id="view-new"></section>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-head"><span class="mico" id="mico"></span><span class="mtitle" id="mtitle"></span></div>
    <div class="modal-explain" id="mexplain"></div>
    <div class="modal-body" id="mbody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* Firebase config — project: gnoming-around-scores */
const firebaseConfig = {
  apiKey: "AIzaSyCL-OvpfKgPFn01nxVjYnsphLFYdhzjqQw",
  authDomain: "gnoming-around-scores.firebaseapp.com",
  databaseURL: "https://gnoming-around-scores-default-rtdb.firebaseio.com",
  projectId: "gnoming-around-scores",
  storageBucket: "gnoming-around-scores.firebasestorage.app",
  messagingSenderId: "397931802092",
  appId: "1:397931802092:web:f8a2d0fe5fceb16a6ae4c9"
};
let db=null, ready=false;
try{ db=getDatabase(initializeApp(firebaseConfig)); ready=true; }catch(e){ console.warn(e); }

const ROUNDS=3, MIN=2, MAX=7;
const $=id=>document.getElementById(id);
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function avg(a){return a.reduce((x,y)=>x+y,0)/a.length;}
function fmtDate(d){const [y,m,dd]=(d||'').split('-').map(Number);if(!y)return '—';return new Date(y,m-1,dd).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function pname(g,i){return g.players[i]&&g.players[i].name ? esc(g.players[i].name) : `<span style="color:#aab0a0">Player ${i+1}</span>`;}

/* normalize a raw game record from RTDB */
function normGame(key,v){
  const raw=(Array.isArray(v.players)?v.players:Object.values(v.players||{}));
  const players=raw.map(p=>({name:(p&&p.name)||''}));
  let rounds=v.rounds?(Array.isArray(v.rounds)?v.rounds:Object.values(v.rounds)):[];
  rounds=rounds.map(r=>(Array.isArray(r)?r:Object.values(r||{})).map(Number));
  let status=v.status||'in_progress';
  // legacy single-score games (from the old form): treat the score as a one-round final total
  if(rounds.length===0 && raw.some(p=>p&&typeof p.score==='number')){
    rounds=[raw.map(p=>Number((p&&p.score)||0))];
    status='final';
  }
  return {key,date:v.date||'',createdAt:v.createdAt||0,status,players,rounds};
}
function totals(g){return g.players.map((_,i)=>g.rounds.reduce((s,r)=>s+(typeof r[i]==='number'?r[i]:0),0));}

let games=[];
let activeKey=localStorage.getItem('gnome_active_game')||null;

/* ===== tabs ===== */
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    if(t.dataset.view==='new'){ $('view-new').classList.add('active'); renderNewTab(); }
    else $('view-board').classList.add('active');
  });
});

/* ===== New / Continue tab ===== */
let startCount=4;
const DEFAULT_NAMES=['Kenaz','Kaleb','Ann','Aden'];
function renderNewTab(){
  if(!ready){ $('view-new').innerHTML='<div class="setup-warn">Not connected to Firebase.</div>'; return; }
  const active=activeKey?games.find(g=>g.key===activeKey&&g.status==='in_progress'):null;
  if(active) renderRoundEntry(active); else { activeKey=null; localStorage.removeItem('gnome_active_game'); renderStartForm(); }
}

function renderStartForm(prev){
  const rows=[];
  for(let i=0;i<startCount;i++){
    const nm=prev&&prev[i]!=null?prev[i]:(DEFAULT_NAMES[i]||'');
    rows.push(`<div class="prow"><span class="pn">🧙</span><input class="name" data-i="${i}" type="text" maxlength="20" placeholder="Player ${i+1}" value="${esc(nm)}"></div>`);
  }
  $('view-new').innerHTML=`
    <div class="form-card">
      <div class="field">
        <label>How many gnomes?</label>
        <div class="stepper">
          <button type="button" id="minus">−</button>
          <span class="count" id="pcount">${startCount}</span>
          <button type="button" id="plus">＋</button>
        </div>
        <div class="hint">2–7 players. Name them to track stats on the leaderboard.</div>
      </div>
      <div class="field"><label>Date</label><input type="date" id="gdate"></div>
      <div class="field"><label>Players</label><div class="players">${rows.join('')}</div></div>
      <div class="err" id="formErr"></div>
      <button class="btn" id="startBtn">🎴 Start Game (Round 1)</button>
    </div>`;
  $('gdate').value=new Date().toLocaleDateString('en-CA');
  const readNames=()=>[...document.querySelectorAll('#view-new .name')].map(n=>n.value);
  $('minus').onclick=()=>{ if(startCount>MIN){const p=readNames();startCount--;renderStartForm(p);} };
  $('plus').onclick=()=>{ if(startCount<MAX){const p=readNames();startCount++;renderStartForm(p);} };
  $('minus').disabled=startCount<=MIN; $('plus').disabled=startCount>=MAX;
  $('startBtn').onclick=async()=>{
    const names=readNames().map(n=>n.trim().slice(0,20));
    const date=$('gdate').value||new Date().toLocaleDateString('en-CA');
    try{
      const r=await push(ref(db,'games'),{date,createdAt:Date.now(),status:'in_progress',
        players:names.map(n=>({name:n})), rounds:[]});
      activeKey=r.key; localStorage.setItem('gnome_active_game',r.key);
      toast('🎴 Game started — enter Round 1!');
      renderNewTab();
    }catch(e){ $('formErr').textContent='Could not start: '+e.message; }
  };
}

function renderRoundEntry(g){
  const done=g.rounds.length;          // rounds already entered
  const cur=done+1;                    // round we're entering now
  const tot=totals(g);
  const pips=[];
  for(let i=1;i<=ROUNDS;i++) pips.push(`<div class="pip ${i<=done?'done':i===cur?'cur':''}"></div>`);
  const rows=g.players.map((p,i)=>{
    const prior=done?`<span class="rprev">so far <b>${tot[i]}</b></span>`:'';
    return `<div class="prow">
      <span class="pn">🧙</span>
      <span class="rname">${p.name?esc(p.name):`Player ${i+1}`}</span>
      ${prior}
      <input class="score" type="number" step="1" inputmode="numbers" placeholder="0" data-i="${i}">
    </div>`;
  }).join('');
  $('view-new').innerHTML=`
    <div class="form-card">
      <div class="progress">${pips.join('')}</div>
      <div class="roundtitle">⛳ Round ${cur} of ${ROUNDS}</div>
      <div class="roundsub">${esc(fmtDate(g.date))} · ${g.players.length} players · lowest total wins</div>
      <div class="players">${rows}</div>
      <div class="err" id="formErr"></div>
      <button class="btn" id="submitRound">${cur===ROUNDS?'🏁 Submit Final Round':'Submit Round '+cur+' →'}</button>
      <button class="btn secondary" id="abandon">✕ Abandon this game</button>
    </div>`;
  $('submitRound').onclick=async()=>{
    const inputs=[...document.querySelectorAll('#view-new .score')];
    const scores=[];
    for(let i=0;i<inputs.length;i++){
      const v=inputs[i].value.trim();
      if(v===''||isNaN(Number(v))){ $('formErr').textContent=`Enter a score for every player (row ${i+1} missing).`; return; }
      scores.push(Math.round(Number(v)));
    }
    const idx=g.rounds.length;
    const upd={}; upd['rounds/'+idx]=scores;
    const isFinal=(idx+1>=ROUNDS);
    if(isFinal) upd['status']='final';
    try{
      await update(ref(db,'games/'+g.key),upd);
      if(isFinal){ activeKey=null; localStorage.removeItem('gnome_active_game'); toast('🏆 Game complete!'); document.querySelector('.tab[data-view="board"]').click(); }
      else { toast('✅ Round '+(idx+1)+' saved!'); renderNewTab(); }
    }catch(e){ $('formErr').textContent='Could not save: '+e.message; }
  };
  $('abandon').onclick=()=>{
    if(!confirm('Abandon and delete this in-progress game?')) return;
    remove(ref(db,'games/'+g.key)).then(()=>{ activeKey=null; localStorage.removeItem('gnome_active_game'); renderNewTab(); toast('Game abandoned.'); });
  };
}

/* ===== Leaderboard ===== */
$('games').addEventListener('click',e=>{
  const b=e.target.closest('.game-del'); if(!b)return;
  if(!confirm('Delete this game? Removes it for everyone.')) return;
  remove(ref(db,'games/'+b.dataset.key)).catch(err=>alert('Could not delete: '+err.message));
});
$('live').addEventListener('click',e=>{
  const b=e.target.closest('.game-del'); if(!b)return;
  if(!confirm('Delete this in-progress game?')) return;
  if(b.dataset.key===activeKey){ activeKey=null; localStorage.removeItem('gnome_active_game'); }
  remove(ref(db,'games/'+b.dataset.key)).catch(err=>alert('Could not delete: '+err.message));
});

function gameRows(g,{live}={}){
  const tot=totals(g);
  const best=Math.min(...tot);
  const order=g.players.map((_,i)=>i).sort((a,b)=>tot[a]-tot[b]);
  return order.map((i,rank)=>{
    const isBest=tot[i]===best;
    const cls=isBest?(live?' leader':' winner'):'';
    const rstr=g.rounds.length?`<span class="rounds">${g.rounds.map(r=>r[i]).join(' · ')}</span>`:'';
    return `<div class="row${cls}"><span class="rank">${rank+1}</span><span class="pname">${pname(g,i)}</span>${rstr}<span class="pscore">${tot[i]}</span></div>`;
  }).join('');
}

function renderBoard(){
  const live=games.filter(g=>g.status==='in_progress');
  const finals=games.filter(g=>g.status==='final');

  $('live').innerHTML = live.length ? live.map(g=>`
    <div class="game live">
      <div class="game-head">
        <span class="game-date">🎴 ${esc(fmtDate(g.date))}</span>
        <span><span class="live-badge">LIVE · Round ${Math.min(g.rounds.length+ (g.rounds.length<ROUNDS?1:0),ROUNDS)}/${ROUNDS}</span>
        <button class="game-del" data-key="${g.key}" title="Delete">✕</button></span>
      </div>${gameRows(g,{live:true})}</div>`).join('') : '';

  const box=$('games');
  if(!finals.length){
    box.innerHTML=`<div class="empty"><div class="big">🏌️</div>No finished games yet. Tap <b>➕ New / Continue</b> to start one!</div>`;
  }else{
    box.innerHTML=finals.map(g=>`
      <div class="game">
        <div class="game-head"><span class="game-date">⛳ ${esc(fmtDate(g.date))}</span>
        <button class="game-del" data-key="${g.key}" title="Delete">✕</button></div>
        ${gameRows(g)}</div>`).join('');
  }
  renderStats(finals);
}

let detailData=null;
function renderStats(finals){
  const named={}; const allRounds=[]; const allTotals=[]; const log=[];
  finals.forEach(g=>{
    const tot=totals(g); const min=Math.min(...tot), max=Math.max(...tot);
    log.push({date:g.date, min, rows:g.players.map((p,i)=>({name:p.name||('Player '+(i+1)),total:tot[i]})).sort((a,b)=>a.total-b.total)});
    g.players.forEach((p,i)=>{
      if(p.name){
        const n=named[p.name]||(named[p.name]={wins:[],lasts:[],totals:[],games:0});
        n.games++; n.totals.push(tot[i]);
        if(tot[i]===min) n.wins.push(g.date);
        if(tot[i]===max && g.players.length>1) n.lasts.push(g.date);
        allTotals.push({v:tot[i],name:p.name,date:g.date});
        g.rounds.forEach((r,ri)=>{ if(typeof r[i]==='number') allRounds.push({v:r[i],name:p.name,date:g.date,round:ri+1}); });
      }
    });
  });
  const names=Object.keys(named);
  detailData={named,names,allRounds,allTotals,log,gamesPlayed:finals.length};
  const champ=names.slice().sort((a,b)=>named[b].wins.length-named[a].wins.length)[0];
  const spoon=names.filter(n=>named[n].lasts.length>0).sort((a,b)=>named[b].lasts.length-named[a].lasts.length)[0];
  const bestRound=allRounds.slice().sort((a,b)=>a.v-b.v)[0];
  const bestGame=allTotals.slice().sort((a,b)=>a.v-b.v)[0];
  const tiles=[
    {s:'games',ico:'⛳',lbl:'Games Played',val:finals.length||'0'},
    {s:'gnomes',ico:'🧙',lbl:'Gnomes',val:names.length||'0'},
    {s:'champ',ico:'🏆',lbl:'Clubhouse Champ',val:champ&&named[champ].wins.length?`${esc(champ)}<small>${named[champ].wins.length} win${named[champ].wins.length>1?'s':''}</small>`:'—'},
    {s:'bestRound',ico:'🎯',lbl:'Best Round',val:bestRound?`${bestRound.v}<small>${esc(bestRound.name)}</small>`:'—'},
    {s:'bestGame',ico:'🏅',lbl:'Best Game',val:bestGame?`${bestGame.v}<small>${esc(bestGame.name)}</small>`:'—'},
    {s:'spoon',ico:'🪵',lbl:'Wooden Spoon',val:spoon?`${esc(spoon)}<small>${named[spoon].lasts.length} last</small>`:'—'},
  ];
  $('stats').innerHTML=tiles.map(t=>`<div class="stat" data-stat="${t.s}"><div class="ico">${t.ico}</div><div class="lbl">${t.lbl}</div><div class="val">${t.val}</div></div>`).join('');
}

/* ---- stat detail modal ---- */
function emptyMsg(){return '<div class="empty" style="padding:24px 0">No data yet.</div>';}
function fmtDates(ds){return ds.map(d=>fmtDate(d)).join(', ');}
function rankRows(arr,fmt){
  return arr.map((it,i)=>{const r=fmt(it,i);
    return `<div class="drow${i===0?' top':''}"><span class="drank">${i+1}</span><span class="dmain"><div class="dname">${r.label}</div>${r.sub?`<div class="dsub">${r.sub}</div>`:''}</span><span class="dval">${r.val}</span></div>`;}).join('');
}
function openStat(stat){
  if(!detailData)return;
  const {named,names,allRounds,allTotals,log}=detailData;
  let ico='',title='',explain='',body='';
  if(stat==='games'){
    ico='⛳';title='Games Played';
    explain='Every finished game on record — your full season log, newest first. The 🏆 marks the lowest total (the winner) in each game.';
    body=log.length?log.map(L=>`<div class="logitem"><div class="logdate">⛳ ${esc(fmtDate(L.date))}</div>${L.rows.map(r=>`<div class="lrow${r.total===L.min?' win':''}"><span>${esc(r.name)}${r.total===L.min?' 🏆':''}</span><span class="lv">${r.total}</span></div>`).join('')}</div>`).join(''):emptyMsg();
  }else if(stat==='gnomes'){
    ico='🧙';title='Gnomes';
    explain='Every named gnome who has played (players left unnamed are not tracked across games). Sorted by games played, with wins and last-place finishes.';
    const arr=names.slice().sort((a,b)=>named[b].games-named[a].games);
    body=arr.length?rankRows(arr,n=>({label:esc(n),sub:`${named[n].wins.length} win${named[n].wins.length===1?'':'s'} · ${named[n].lasts.length} last`,val:named[n].games})):emptyMsg();
  }else if(stat==='champ'){
    ico='🏆';title='Clubhouse Champ';
    explain='A win means finishing a game with the lowest total score (if there is a tie, everyone tied gets the win). Ranked by total wins — the dates won are listed so you can see it over time.';
    const arr=names.filter(n=>named[n].wins.length>0).sort((a,b)=>named[b].wins.length-named[a].wins.length);
    body=arr.length?rankRows(arr,n=>({label:esc(n),sub:fmtDates(named[n].wins),val:named[n].wins.length})):emptyMsg();
  }else if(stat==='bestRound'){
    ico='🎯';title='Best Round';
    explain='The lowest score anyone posted in a single round. Rounds go negative when you match rows or columns, so lower is better. Top 12 single rounds of all time.';
    const arr=allRounds.slice().sort((a,b)=>a.v-b.v).slice(0,12);
    body=arr.length?rankRows(arr,it=>({label:esc(it.name),sub:`${esc(fmtDate(it.date))} · Round ${it.round}`,val:it.v})):emptyMsg();
  }else if(stat==='bestGame'){
    ico='🏅';title='Best Game';
    explain='The lowest game total ever posted (sum of all rounds). Lower is better. Top 12 games of all time.';
    const arr=allTotals.slice().sort((a,b)=>a.v-b.v).slice(0,12);
    body=arr.length?rankRows(arr,it=>({label:esc(it.name),sub:esc(fmtDate(it.date)),val:it.v})):emptyMsg();
  }else if(stat==='spoon'){
    ico='🪵';title='Wooden Spoon';
    explain='Last place = the highest total in a game. This counts how often each gnome finished dead last. Worn with shame.';
    const arr=names.filter(n=>named[n].lasts.length>0).sort((a,b)=>named[b].lasts.length-named[a].lasts.length);
    body=arr.length?rankRows(arr,n=>({label:esc(n),sub:fmtDates(named[n].lasts),val:named[n].lasts.length})):emptyMsg();
  }
  $('mico').textContent=ico; $('mtitle').textContent=title; $('mexplain').textContent=explain; $('mbody').innerHTML=body;
  $('modal').classList.add('show');
}
function closeModal(){$('modal').classList.remove('show');}
$('stats').addEventListener('click',e=>{const t=e.target.closest('.stat');if(t&&t.dataset.stat)openStat(t.dataset.stat);});
$('modalClose').addEventListener('click',closeModal);
$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ===== live data ===== */
if(!ready){
  $('view-board').innerHTML='<div class="setup-warn">⚙️ Not connected to Firebase. Check the config in index.html.</div>';
}else{
  onValue(ref(db,'games'),snap=>{
    const data=snap.val()||{};
    games=Object.entries(data).map(([k,v])=>normGame(k,v))
      .filter(g=>g.players.length>=1)
      .sort((a,b)=>(a.date<b.date?1:a.date>b.date?-1:0)||(b.createdAt-a.createdAt));
    renderBoard();
    // if the New tab is showing, keep it in sync (but only when not mid-typing a start form)
    if($('view-new').classList.contains('active') && activeKey) renderNewTab();
  });
}
</script>
